name: Production smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "35 */6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check production
        run: npm run smoke:prod
        env:
          SMOKE_APP_URL: https://papo-reto-beige.vercel.app
